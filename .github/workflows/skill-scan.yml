name: Snyk Agent Scan (skills)

# Scans the published skills/ content with Snyk's Agent Scan skill inspector
# (https://github.com/snyk/agent-scan) — the same scanner that powers the
# skills.sh /security/snyk findings (e.g. W021 hidden-Unicode).
#
# GATING: only error-class findings fail CI — codes starting with E (analysis
# errors) or X (scan/runtime failures). Warnings (W*) are reported but never fail
# the build. Because the scanner is LLM-based and non-deterministic (the same
# content yields different verdicts run-to-run), the scan runs several times and
# CI fails only on *repeatable* errors (an error seen in a majority of runs).
# Flaky one-off findings are reported but do not fail. The full report goes to
# the job summary + artifact. All gating logic lives in
# .github/scripts/scan_summary.py.
#
# PREREQUISITE: a `SNYK_TOKEN` repository secret (free account at
# https://app.snyk.io/account). Without it the job skips with a warning so that
# pull requests from forks (which have no access to secrets) do not break.

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "plugins/**"
      - ".github/workflows/skill-scan.yml"
      - ".github/scripts/scan_summary.py"
  pull_request:
    paths:
      - "skills/**"
      - "plugins/**"
      - ".github/workflows/skill-scan.yml"
      - ".github/scripts/scan_summary.py"
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC) — re-scan as Snyk's rules evolve
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    name: Scan skills/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false # uvx fetches a one-shot tool; no project deps to cache

      - name: Run Snyk Agent Scan (gating on repeatable findings)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          RUNS: "3" # scan N times; a finding in a majority (2/3) fails CI
        run: |
          set -euo pipefail

          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::warning::SNYK_TOKEN not set — skipping Snyk Agent Scan."
            {
              echo "## Snyk Agent Scan — \`skills/\`"
              echo ""
              echo "_SNYK_TOKEN secret not set; scan skipped._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Run the scan several times — the JSON report carries the actual
          # findings (plain text only lists which skills were scanned). A single
          # scan crash must not abort the loop, hence `|| true`.
          for i in $(seq 1 "$RUNS"); do
            echo "Scan run $i/$RUNS…"
            uvx snyk-agent-scan@latest --skills skills --json > "agent-scan-report.$i.json" || true
          done

          # Aggregate: report every finding, fail (non-zero) only on findings
          # repeatable across a majority of runs. pipefail propagates that exit
          # code through `tee` so the step — and the job — goes red.
          python3 .github/scripts/scan_summary.py agent-scan-report.*.json \
            | tee summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-agent-scan-report
          path: |
            agent-scan-report.*.json
            summary.md
          if-no-files-found: ignore
          retention-days: 30
